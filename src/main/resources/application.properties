# *****************************
# CONFIGURACION DE BASE DE DATOS
# *****************************

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/asistencias_db?serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# *****************************
# CONFIGURACION DE HIBERNATE (JPA)
# *****************************
# SpringBoot crea automaticamente las tablas en base al codigo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# *****************************
# PRECIOS DE CLASES (configurables sin recompilar)
# *****************************
precios.grupal=40000
precios.media-grupal=30000
precios.personalizada=50000

# *****************************
# JWT (Seguridad)
# *****************************
jwt.secret=asistencias_erp_secret_key_2026_must_be_at_least_256_bits_long_!!!!!
jwt.expiration-ms=86400000