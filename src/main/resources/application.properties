# *****************************
# CONFIGURACION DE BASE DE DATOS
# *****************************

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/asistencias_db?serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# *****************************
# HIKARICP (Pool de Conexiones para Aiven)
# *****************************
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:20000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}

# *****************************
# CONFIGURACION DE HIBERNATE (JPA)
# *****************************
# ddl-auto: validate en prod/staging, update solo en desarrollo local
# Produccion: DDL_AUTO=validate  |  Local: DDL_AUTO=update
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# *****************************
# PRECIOS DE CLASES (configurables sin recompilar)
# *****************************
precios.grupal=40000
precios.personalizada=50000

# *****************************
# JACKSON (Serialización JSON - Timezone UTC)
# *****************************
spring.jackson.time-zone=${JACKSON_TIMEZONE:UTC}
spring.jackson.locale=es_CO

# *****************************
# JWT (Seguridad)
# *****************************
# Usar variable de entorno JWT_SECRET en produccion/staging.
# El fallback solo es seguro para desarrollo local, JAMAS usar el default en produccion.
jwt.secret=${JWT_SECRET:asistencias_erp_secret_key_2026_must_be_at_least_256_bits_long_!!!!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}