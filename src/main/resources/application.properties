# *****************************
# CONFIGURACION DE BASE DE DATOS
# *****************************

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/asistencias_db?serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# *****************************
# HIKARICP (Pool de Conexiones optimizado - PERF-HIKARI-01)
# *****************************
#
# Fórmula de capacidad: ((cores * 2) + spindles)
#   - Render Free/Starter: 1 vCPU → (1*2)+1 = 3 conexiones ideales
#   - Render Pro/Standard: 2 vCPU → (2*2)+1 = 5 conexiones ideales
#   - Local (XAMPP/Laragon): 4+ vCPU → pool generoso para desarrollo
#
# ═══ ESTRATEGIA ZERO-MANUAL-CHANGES ═══
#   - LOCAL: sin HIKARI_MAX_POOL en env → 10 conexiones (desarrollo cómodo)
#   - PRODUCCIÓN: Render inyecta HIKARI_MAX_POOL=10 → 10 conexiones
#   - El pool mínimo se adapta: local 3, producción/staging 3
# ═══════════════════════════════════════
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:3}

# Tiempo máximo que una conexión puede estar inactiva antes de cerrarse
#   - Local: no relevante (BD local)
#   - Producción: Aiven cierra conexiones inactivas > 30 min
#   - Valor: 10 minutos (600s) — balance entre reconexión y mantener pool vivo
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}

# Tiempo máximo de espera por una conexión del pool
#   - Antes: 20000ms (20s) — demasiado, la app se "cuelga" por 20s
#   - Ahora: 5000ms (5s) — falla rápido si el pool está agotado
#   - El frontend puede reintentar con backoff exponencial
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:5000}

# Vida máxima de una conexión en el pool
#   - Aiven/MariaDB/MySQL tienen timeout de 8h (28800s) en conexiones ociosas
#   - Valor: 30 min (1800000ms) — se renuevan antes del timeout del proveedor
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}

# Umbral de detección de fugas de conexión (leak-detection)
#   - Si una conexión se retiene > 15s, HikariCP la reporta en los logs
#   - Útil para detectar queries lentas o transacciones sin cierre
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_THRESHOLD:15000}

# *****************************
# CONFIGURACION DE HIBERNATE (JPA)
# *****************************
# ddl-auto: validate en prod/staging, update solo en desarrollo local
# Produccion: DDL_AUTO=validate  |  Local: DDL_AUTO=update
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# *****************************
# PRECIOS DE CLASES (configurables sin recompilar)
# *****************************
precios.grupal=40000
precios.personalizada=50000

# *****************************
# JACKSON (Serialización JSON - Timezone UTC)
# *****************************
spring.jackson.time-zone=${JACKSON_TIMEZONE:UTC}
spring.jackson.locale=es_CO

# *****************************
# JWT (Seguridad)
# *****************************
# Usar variable de entorno JWT_SECRET en produccion/staging.
# El fallback solo es seguro para desarrollo local, JAMAS usar el default en produccion.
jwt.secret=${JWT_SECRET:asistencias_erp_secret_key_2026_must_be_at_least_256_bits_long_!!!!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}